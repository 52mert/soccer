name: Mert Skor - Mac Guncelleme Cron

on:
  schedule:
    # TEK KURAL: 7/24 her saat başı çalışır (Günde 24 kez çalışarak limitini korur)
    - cron: '0 * * * *'
    
  workflow_dispatch: # Senin istediğin zaman GitHub üzerinden manuel tetikleyebilmen için

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Vercel API Tetikle
        run: |
          curl -X GET "https://soccer2-ashen.vercel.app/api/fetch-matches" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
